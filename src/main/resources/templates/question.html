<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${question.cost} | ${board.title}|">Вопрос</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page-shell page-shell--narrow">
    <a class="back-link" th:href="@{/}">← К игровому полю</a>

    <section class="question-card">
        <p class="eyebrow">Вопрос за <span th:text="${question.cost}">100</span></p>
        <h1 th:text="${question.question}">Текст вопроса</h1>
        <p class="hint" th:text="|Подсказка: ${question.hint}|">Подсказка</p>

        <details class="answer-box">
            <summary>Показать ответ</summary>
            <p th:text="${question.answer}">Ответ</p>
        </details>
    </section>
</main>
</body>
</html>
